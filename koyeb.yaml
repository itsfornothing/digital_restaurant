app:
  name: restaurant-platform
  regions:
    - fra
  env:
    - key: DJANGO_SETTINGS_MODULE
      value: config.settings.production
    - key: ALLOWED_HOSTS
      value: .koyeb.app,.ngrok-free.dev
    - key: CSRF_TRUSTED_ORIGINS
      value: https://*.koyeb.app,https://*.ngrok-free.dev
    - key: CUSTOMER_DOMAIN
      value: CHANGE-ME.koyeb.app
    - key: R2_ENDPOINT_URL
      secret: R2_ENDPOINT_URL
    - key: R2_ACCESS_KEY_ID
      secret: R2_ACCESS_KEY_ID
    - key: R2_SECRET_ACCESS_KEY
      secret: R2_SECRET_ACCESS_KEY
    - key: R2_BUCKET_NAME
      secret: R2_BUCKET_NAME

  services:
    - name: asgi
      dockerfile: Dockerfile
      instance_type: free
      ports:
        - port: 8000
          protocol: http
      routes:
        - path: /
          port: 8000
      env:
        - key: PORT
          value: "8000"
      health:
        path: /health

  databases:
    - name: restaurant-platform-db
      engine: POSTGRESQL
      version: "16"
      plan: free

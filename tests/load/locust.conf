# locust.conf — default configuration for Restaurant Platform load tests
#
# Run with:
#   locust -f tests/load/locustfile.py
# or headless:
#   locust -f tests/load/locustfile.py --headless
#
# Override any setting via CLI flag:
#   locust -f tests/load/locustfile.py --host https://staging.platform.com --users 100
#
# Performance targets (Requirements 19.1, 19.2, 19.3):
#   p95 API response    < 500 ms
#   WebSocket notify    < 2 s end-to-end
#   Menu page (4G)      < 2 s first meaningful paint
#   deduct_inventory    < 5 s median, < 10 s p95

# ---------------------------------------------------------------------------
# Target host — override with LOCUST_HOST env var or --host CLI flag
# ---------------------------------------------------------------------------
# host = http://localhost:8000

# ---------------------------------------------------------------------------
# Load profile defaults (--users 500 --spawn-rate 10)
# ---------------------------------------------------------------------------
users = 500
spawn-rate = 10

# ---------------------------------------------------------------------------
# Test duration — default 10 minutes; override with --run-time
# ---------------------------------------------------------------------------
run-time = 10m
headless = false

# ---------------------------------------------------------------------------
# Output
# ---------------------------------------------------------------------------
# Print stats in the console every 10 seconds
print-stats = true

# Write CSV stats to tests/load/results/ for post-run analysis
# csv = tests/load/results/locust_run
# csv-full-history = true

# ---------------------------------------------------------------------------
# Web UI settings (when running interactively)
# ---------------------------------------------------------------------------
web-port = 8089
web-host = 0.0.0.0

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
loglevel = INFO

# ---------------------------------------------------------------------------
# Exit code 1 when any SLA threshold is breached
# (Requires locust >= 2.x; controlled via custom event hook in locustfile.py)
# ---------------------------------------------------------------------------
# exit-code-on-error = 1

# ---------------------------------------------------------------------------
# Environment-specific credentials (prefer env vars over this file)
# Set these as environment variables in your CI/CD pipeline:
#   LOCUST_STAFF_EMAIL=staff@example.com
#   LOCUST_STAFF_PASSWORD=...
#   LOCUST_QR_TOKENS=<uuid1>,<uuid2>,...
#   LOCUST_BRANCH_ID=<uuid>
#   LOCUST_ORDER_IDS=<uuid1>,<uuid2>,...
# ---------------------------------------------------------------------------

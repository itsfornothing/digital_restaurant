# nginx/current_upstream.conf — Active upstream for blue-green deployment
#
# This file is GENERATED by the CI/CD deploy-production workflow.
# It is overwritten atomically when the active slot switches.
# DO NOT edit manually — edit nginx/slots/blue.conf or nginx/slots/green.conf.
#
# Default active slot: blue (port 8010)
#
# Requirements: 19.8

upstream gunicorn {
    server 127.0.0.1:8010 fail_timeout=5s max_fails=3;
    keepalive 32;
}

upstream daphne {
    server 127.0.0.1:8011 fail_timeout=5s max_fails=3;
    keepalive 16;
}

# nginx/slots/blue.conf — Blue-slot upstream configuration
#
# Used by the blue-green deployment workflow.
# Copied to nginx/current_upstream.conf when the blue slot is active.
#
# Blue slot runs Gunicorn on port 8010, Daphne on port 8011.
# These ports are bound to the host by the blue-slot docker compose project.
#
# Requirements: 19.8

upstream gunicorn {
    server 127.0.0.1:8010 fail_timeout=5s max_fails=3;
    keepalive 32;
}

upstream daphne {
    server 127.0.0.1:8011 fail_timeout=5s max_fails=3;
    keepalive 16;
}

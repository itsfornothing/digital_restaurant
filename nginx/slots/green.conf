# nginx/slots/green.conf — Green-slot upstream configuration
#
# Used by the blue-green deployment workflow.
# Copied to nginx/current_upstream.conf when the green slot is active.
#
# Green slot runs Gunicorn on port 8020, Daphne on port 8021.
# These ports are bound to the host by the green-slot docker compose project.
#
# Requirements: 19.8

upstream gunicorn {
    server 127.0.0.1:8020 fail_timeout=5s max_fails=3;
    keepalive 32;
}

upstream daphne {
    server 127.0.0.1:8021 fail_timeout=5s max_fails=3;
    keepalive 16;
}

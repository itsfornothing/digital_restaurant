# nginx.prod.conf — Production Nginx configuration
#
# Features:
#   - TLS 1.3 only (TLS 1.2 disabled)
#   - Wildcard subdomain routing: *.platform.example.com → Daphne
#   - Custom domain mapping: any non-wildcard host → Daphne
#   - WebSocket upgrade headers for /ws/ paths
#   - HTTP → HTTPS redirect (301)
#   - HSTS preload-ready headers
#   - Gzip compression
#   - Health check endpoint (no auth, no logging)
#
# All traffic (HTTP + WebSocket) proxied to Daphne on :8000.
# Single-process required for InMemoryChannelLayer.
#
# Requirements: 19.4, 19.8, 19.9

# ---------------------------------------------------------------------------
# Upstream — single Daphne process serving both HTTP and WebSocket
# ---------------------------------------------------------------------------

upstream asgi {
    server asgi:8000 fail_timeout=5s max_fails=3;
    keepalive 32;
}

# ---------------------------------------------------------------------------
# HTTP → HTTPS redirect
# ---------------------------------------------------------------------------

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Let's Encrypt / ACME http-01 challenge passthrough
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP requests to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# HTTPS — Wildcard subdomain + custom domain
# ---------------------------------------------------------------------------

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    # Wildcard subdomain: *.platform.example.com
    # Custom domains are handled by the same block via the catch-all server_name
    server_name *.platform.example.com platform.example.com;

    # ------------------------------------------------------------------
    # TLS 1.3 configuration
    # ------------------------------------------------------------------

    ssl_certificate     /etc/nginx/ssl/platform.example.com.crt;
    ssl_certificate_key /etc/nginx/ssl/platform.example.com.key;

    # TLS 1.3 ONLY — TLS 1.2 disabled for PCI/compliance hardening
    ssl_protocols TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Session resumption
    ssl_session_timeout 1d;
    ssl_session_cache shared:MozSSL:10m;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ------------------------------------------------------------------
    # Compression
    # ------------------------------------------------------------------

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_comp_level 5;
    gzip_vary on;

    # ------------------------------------------------------------------
    # Security headers
    # ------------------------------------------------------------------

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"   always;
    add_header X-Frame-Options           "DENY"      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ------------------------------------------------------------------
    # General proxy settings
    # ------------------------------------------------------------------

    client_max_body_size 25M;

    proxy_http_version    1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;

    # ------------------------------------------------------------------
    # Health check endpoint — no logging, no auth, fast return
    # ------------------------------------------------------------------

    location = /health {
        access_log off;
        proxy_pass http://asgi;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 5s;
    }

    # ------------------------------------------------------------------
    # Static files — served directly by Nginx from the bind mount
    # ------------------------------------------------------------------

    location /static/ {
        alias   /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ------------------------------------------------------------------
    # WebSocket connections (/ws/) → Daphne (Django Channels)
    # ------------------------------------------------------------------

    location /ws/ {
        proxy_pass http://asgi;

        # WebSocket upgrade headers (required)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        # WebSocket connections are long-lived
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
        proxy_connect_timeout 10s;
    }

    # ------------------------------------------------------------------
    # Metrics endpoint (Prometheus) — restrict to internal networks
    # ------------------------------------------------------------------

    location /metrics {
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny  all;

        proxy_pass http://asgi;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
    }

    # ------------------------------------------------------------------
    # All other HTTPS traffic → Daphne (HTTP + WebSocket in one process)
    # ------------------------------------------------------------------

    location / {
        proxy_pass http://asgi;

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;

        # Buffer tuning
        proxy_buffering    on;
        proxy_buffer_size  16k;
        proxy_buffers      4 16k;
    }
}

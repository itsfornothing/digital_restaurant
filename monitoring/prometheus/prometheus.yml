---
# Prometheus scrape configuration for the Restaurant Platform
# Requirements: 6.2, 6.3, 6.4, 6.5, 6.6, 6.7

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: production
    service: restaurant-platform

# Load alerting rules
rule_files:
  - "./alerts.yml"

# Alertmanager connection
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  # -------------------------------------------------------------------------
  # Django application metrics — scraped via django-prometheus /metrics
  # -------------------------------------------------------------------------
  - job_name: django
    scrape_interval: 15s
    static_configs:
      - targets:
          - web:8000
    metrics_path: /metrics

  # -------------------------------------------------------------------------
  # Django health probe — scraped every 30s as a blackbox-style probe
  # (Prometheus records `up` metric based on HTTP 200 response)
  # -------------------------------------------------------------------------
  - job_name: django-health
    scrape_interval: 30s
    static_configs:
      - targets:
          - web:8000
    metrics_path: /health
    # Treat any 2xx response as "up" and record the probe result
    honor_labels: true

---
# Alertmanager configuration — Restaurant Platform
# Customize receivers with real notification targets (email, Slack, PagerDuty, etc.)

global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
  receiver: "default-receiver"

  routes:
    - match:
        severity: critical
      receiver: "default-receiver"
      continue: false

receivers:
  - name: "default-receiver"
    # Replace with real notification integrations (email, Slack, PagerDuty, etc.)
    # Example Slack:
    # slack_configs:
    #   - api_url: 'https://hooks.slack.com/services/...'
    #     channel: '#platform-alerts'

inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname"]

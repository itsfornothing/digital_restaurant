# render.yaml — Render Blueprint for Restaurant Platform
# https://render.com/docs/blueprint-spec
#
# Deploy:
#   1. Push this repo to GitHub
#   2. In Render Dashboard: New → Blueprint → Connect your repo
#   3. Render auto-creates the web service + managed PostgreSQL
#
# Manual alternative:
#   Create a Web Service → Docker → point at this repo, add env vars below.

services:
  - type: web
    name: restaurant-platform
    env: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: daphne -b 0.0.0.0 -p $PORT config.asgi:application
    plan: starter
    region: ohio
    healthCheckPath: /health
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DB_NAME
        fromDatabase:
          name: restaurant-platform-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: restaurant-platform-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: restaurant-platform-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: restaurant-platform-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: restaurant-platform-db
          property: port
      - key: R2_ENDPOINT_URL
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: EMAIL_HOST
        value: smtp.sendgrid.net
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        value: noreply@platform.example.com

databases:
  - name: restaurant-platform-db
    plan: starter
    region: ohio
    databaseName: restaurant_platform
    ipAllowList: []  # allow only from Render services

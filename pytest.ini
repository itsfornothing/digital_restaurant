[pytest]
DJANGO_SETTINGS_MODULE = config.settings.testing
python_files = tests.py test_*.py *_tests.py
python_classes = Test*
python_functions = test_*
addopts =
    --strict-markers
    --tb=short
asyncio_mode = auto
markers =
    slow: mark test as slow-running
    integration: mark test as requiring infrastructure (DB, Redis)
    unit: mark test as a pure unit test
    asyncio: mark test as async
    performance: mark test as a performance or Lighthouse test (may require external tools)
    e2e: mark test as an end-to-end test covering a complete user flow
    tenant_isolation: mark test as verifying tenant data isolation (E2E-03)
